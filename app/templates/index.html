<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Taking App - Version {{ app_version }}</title>
</head>
<body>
    <h1>Welcome to the Note Taking App - Version {{ app_version }}</h1>
    <h2>Notes:</h2>
    <ul>
        {% for note in notes %}
            <li>
                <strong>{{ note.title }}</strong><br>
                <p>{{ note.content }}</p>
            </li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('add_note') }}">Add a new note</a>
</body>
</html>
